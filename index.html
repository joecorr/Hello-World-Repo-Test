<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Nines – Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .hero img.logo {
      width: 160px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.5;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Work section */
    .work {
      padding: 4rem 2rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .work h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.4;
      margin-bottom: 2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 16 / 10;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 1.25rem 1.25rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .card-label span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      display: block;
      margin-bottom: 0.25rem;
    }

    .card-label h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <section class="hero">
    <img class="logo" src="logo.png" alt="Double Nines" />
    <h1>Hello World</h1>
    <p>We Build Digital Products</p>
  </section>

  <section class="work">
    <h2>Featured Work</h2>
    <div class="cards">

      <div class="card">
        <img
          src="https://cdn.prod.website-files.com/643587e6df2a4f30c5510583/68fa736ec4f4fcc5694ab6c2_xgames-aspen.jpg"
          alt="X Games Aspen"
        />
        <div class="card-label">
          <span>Sports & Media</span>
          <h3>X Games</h3>
        </div>
      </div>

      <div class="card">
        <img
          src="https://cdn.prod.website-files.com/643587e6df2a4f30c5510583/67e427dfe36e65b33a1cdd25_Screenshot%202025-03-26%20at%2010.10.44%E2%80%AFAM-p-1600.png"
          alt="Paramount+ Movie Night"
        />
        <div class="card-label">
          <span>Promotional Site</span>
          <h3>Paramount+ Movie Nights</h3>
        </div>
      </div>

      <div class="card">
        <img
          src="https://cdn.prod.website-files.com/643587e6df2a4f30c5510583/64f9ea048558eb98f858b22f_642c2f4a63ff74369bd60c76_DSC06070-2-p-1600.jpg"
          alt="Coop Truck Sharing"
        />
        <div class="card-label">
          <span>Asset Sharing Platform</span>
          <h3>Coop by Ryder</h3>
        </div>
      </div>

    </div>
  </section>

</body>
</html>

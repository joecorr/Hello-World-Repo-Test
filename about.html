<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About – Hello, World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p {
      margin-top: 1.25rem;
      font-size: 1rem;
      line-height: 1.7;
      opacity: 0.6;
    }

    a.back-link {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fff;
      opacity: 0.4;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    a.back-link:hover {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.25;
    }
  </style>
</head>
<body>

  <main>
    <h1>About</h1>
    <p>This is a Hello World project — a simple demo built using Claude Code and GitHub. It exists to explore what's possible when AI and version control work together from the very first commit.</p>
    <a class="back-link" href="index.html">← Home</a>
  </main>

  <footer>Built by Double Nines</footer>

</body>
</html>
